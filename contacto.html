<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto - Animalia</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="imagenes/logo.ico">
</head>

<body>

<header>
    <h1>Contacto</h1>
    <nav>
        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="productos.html">Productos</a></li>
            <li><a href="servicios.html">Servicios</a></li>
            <li><a href="contacto.html">Contacto</a></li>
        </ul>
    </nav>
</header>

<main>

    <h3>Contáctanos</h3>

    <p>📧 animalia@gmail.com</p>
    <p>📞 612 48 93 07</p>

    <form action="https://script.google.com/macros/s/AKfycbw54wKUrA6YaFADNGD6bDoLujB0waTXZqYZlAUPNMpfCfhSpzU9TgCll7BFGyQ9ccyiOA/exec" method="POST">

        <input type="text" name="nombre" placeholder="Nombre completo" required><br><br>

        <input type="email" name="email" placeholder="Email" required><br><br>

        <input type="tel" name="telefono" placeholder="Teléfono"><br><br>

        <input type="text" name="direccion" placeholder="Dirección (opcional)"><br><br>

        <select name="tipo_mascota">
            <option value="">Tipo de mascota</option>
            <option value="perro">Perro</option>
            <option value="gato">Gato</option>
            <option value="ave">Ave</option>
            <option value="pez">Pez</option>
            <option value="reptil">Reptil</option>
        </select><br><br>

        <select name="motivo">
            <option value="">Motivo de contacto</option>
            <option value="consulta_general">Consulta general</option>
            <option value="productos">Productos</option>
            <option value="adopcion">Adopción</option>
            <option value="veterinaria">Veterinaria</option>
            <option value="envios">Envíos</option>
        </select><br><br>

        <textarea name="mensaje" placeholder="Escribe tu mensaje..." rows="6"></textarea><br><br>

        <label>
            <input type="checkbox" name="privacidad" required>
            Acepto la política de privacidad
        </label><br><br>

        <button type="submit">Enviar mensaje</button>

    </form>

</main>

<footer>
    <p>&copy; 2025 Animalia</p>
</footer>

</body>
</html>
